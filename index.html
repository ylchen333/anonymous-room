<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Splat Walkthrough</title>
  <style>
    :root {
      --bg: #111111;
      --panel: rgba(12, 14, 16, 0.82);
      --panel-border: rgba(255, 255, 255, 0.16);
      --text: #e8e8e8;
      --muted: #9aa0a6;
      --prompt: #7ed3a6;
      --warning: #f0cf73;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
    }

    #loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: rgba(10, 10, 10, 0.9);
      z-index: 400;
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
      color: white;
    }

    #loading-label {
      font-size: 13px;
      color: #c8c8c8;
    }

    #loading-bar-track {
      width: min(340px, calc(100vw - 48px));
      height: 3px;
      background: rgba(255, 255, 255, 0.12);
      overflow: hidden;
    }

    #loading-bar-fill {
      width: 0%;
      height: 100%;
      background: var(--prompt);
      transition: width 0.18s ease;
    }

    #click-to-start {
      display: none;
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 200;
      cursor: pointer;
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    #click-to-start .prompt {
      background: rgba(0, 0, 0, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 16px 18px;
      max-width: min(420px, calc(100vw - 32px));
      line-height: 1.6;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.32);
      pointer-events: auto;
    }

    #terminal-overlay {
      display: none;
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 150;
      width: fit-content;
      max-width: min(420px, calc(100vw - 36px));
      padding: 14px 16px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      pointer-events: none;
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    #terminal-header {
      margin-bottom: 6px;
    }

    #terminal-help {
      color: var(--text);
      margin-bottom: 0;
    }

    .terminal-prefix {
      color: var(--text);
    }

    .terminal-prompt {
      color: var(--prompt);
    }

    @media (max-width: 640px) {
      #terminal-overlay {
        top: 12px;
        left: 12px;
        width: calc(100vw - 24px);
        padding: 12px 13px;
      }
    }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div id="loading-label">Loading scene…</div>
  <div id="loading-bar-track"><div id="loading-bar-fill"></div></div>
</div>

<div id="click-to-start">
  <div class="prompt">click here to enable exploration
esc to unlock camera
click to inspect note</div>
</div>

<div id="terminal-overlay">
  <div id="terminal-header"></div>
  <div id="terminal-help"></div>
  <div id="terminal-output"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three":             "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.178.0/three.module.js",
    "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { AssetLibrary } from './src/assetLibrary.js';
  import { SceneManager } from './src/sceneManager.js';

  const TARGET_SCENE_ID = 'desk_longer';
  const ASSET_BASE_URL = getConfiguredAssetBaseUrl();
  const MANIFEST_URL = `${ASSET_BASE_URL}${TARGET_SCENE_ID}_manifest.json`;

  const loadingEl = document.getElementById('loading-overlay');
  const loadingLabel = document.getElementById('loading-label');
  const loadingFill = document.getElementById('loading-bar-fill');
  const clickToStart = document.getElementById('click-to-start');
  const terminalEl = document.getElementById('terminal-overlay');
  const terminalHeaderEl = document.getElementById('terminal-header');
  const terminalHelpEl = document.getElementById('terminal-help');
  const terminalOutputEl = document.getElementById('terminal-output');

  const library = new AssetLibrary(MANIFEST_URL, ASSET_BASE_URL);
  await library.load();

  const scene = library.getById(TARGET_SCENE_ID) ?? library.getAll().find(entry => library.hasSegments(entry));
  if (!scene) {
    throw new Error('No annotated scene was found in the manifest.');
  }

  const manager = new SceneManager(null, { onEvent: handleSceneEvent });
  const scenePromptName = scene.id.split('_')[0] || scene.id || 'scene';
  const scenePathName = scene.room || scenePromptName;
  const selectionHalo = buildSelectionHalo();
  manager.scene.add(selectionHalo);

  let segmentsReady = false;
  let currentSelection = null;
  let typewriterToken = 0;
  setTerminalScene(scenePromptName);

  await manager.switchScene(scene, library);

  clickToStart.addEventListener('click', () => {
    manager.requestPointerLock();
  });

  manager.canvas.addEventListener('click', event => {
    if (!segmentsReady) return;

    const rect = manager.canvas.getBoundingClientRect();
    const clientX = document.pointerLockElement === manager.canvas
      ? rect.left + rect.width / 2
      : event.clientX;
    const clientY = document.pointerLockElement === manager.canvas
      ? rect.top + rect.height / 2
      : event.clientY;

    const entry = manager.pickSegmentFromScreenPoint(clientX, clientY);
    if (!entry) {
      clearSelection();
      return;
    }

    selectSegment(entry, { focus: false });
  });

  document.addEventListener('keydown', event => {
    if (event.code !== 'Space' || !segmentsReady) return;
    event.preventDefault();
    event.stopPropagation();
    manager.setKeyState('Space', false);

    const nextEntry = getNextSegmentEntry();
    if (nextEntry) {
      selectSegment(nextEntry, { focus: true });
    }
  });

  document.addEventListener('keyup', event => {
    if (event.code === 'Space') {
      event.preventDefault();
      event.stopPropagation();
      manager.setKeyState('Space', false);
    }
  });

  function handleSceneEvent(event) {
    switch (event.type) {
      case 'loadProgress': {
        const pct = Math.round((event.n / event.total) * 45);
        loadingFill.style.width = pct + '%';
        loadingLabel.textContent = `loading base splat ${event.n}/${event.total}...`;
        break;
      }

      case 'loadDone': {
        loadingFill.style.width = '48%';
        loadingLabel.textContent = 'loading annotated desk segments...';
        break;
      }

      case 'segmentReady': {
        const total = event.totalExpected;
        const loaded = manager.segments.length;
        const pct = 48 + Math.round((loaded / total) * 52);
        loadingFill.style.width = pct + '%';
        loadingLabel.textContent = `loading annotated desk segments ${loaded}/${total}...`;
        break;
      }

      case 'allSegmentsReady': {
        segmentsReady = true;
        manager.showAllSegments();
        loadingFill.style.width = '100%';
        loadingEl.style.display = 'none';
        terminalEl.style.display = 'block';
        clickToStart.style.display = 'block';
        break;
      }

      case 'locked': {
        clickToStart.style.display = 'none';
        break;
      }

      case 'unlocked': {
        if (segmentsReady) clickToStart.style.display = 'block';
        break;
      }
    }
  }

  function setTerminalScene(sceneName) {
    terminalHeaderEl.innerHTML = `${renderPromptPrefix()} <span class="terminal-prefix">catalogue_raisonne --help</span>`;
    terminalHelpEl.innerHTML = [
      `${renderPromptLine()} An interactive spatial portrait of a lived workspace, reconstructed through Gaussian splatting.`,
      `${renderPromptLine()} A field of objects-tools, fragments, residues-shifts as you move.`,
      `${renderPromptLine()} wasd move | mouse look | scroll zoom | e/q vertical | shift faster | esc release cursor | click inspect note | space next object`
    ].join('\n');
    terminalOutputEl.innerHTML = '';
  }

  function selectSegment(entry, { focus = false } = {}) {
    currentSelection = entry;
    if (focus) {
      manager.focusSegment(entry.meta.clusterId);
    }

    const body = hasAnnotation(entry.meta)
      ? entry.meta.text.trim()
      : 'no annotation is attached to this segment yet.';
    renderTerminalAnnotation(entry.meta.clusterId, body);
    setSelectionHalo(entry.meta);
  }

  function clearSelection() {
    currentSelection = null;
    selectionHalo.visible = false;
    typewriterToken += 1;
    terminalOutputEl.innerHTML = '';
  }

  function hasAnnotation(meta) {
    const text = meta?.text?.trim();
    return Boolean(text && text.toLowerCase() !== 'null');
  }

  function buildSelectionHalo() {
    const geometry = new THREE.SphereGeometry(0.085, 24, 24);
    const material = new THREE.MeshBasicMaterial({
      color: 0x59a7ff,
      transparent: true,
      opacity: 0.24,
      depthWrite: false,
    });
    const halo = new THREE.Mesh(geometry, material);
    halo.visible = false;
    return halo;
  }

  function setSelectionHalo(meta) {
    const centroid = meta?.centroid;
    if (!Array.isArray(centroid) || centroid.length !== 3) {
      selectionHalo.visible = false;
      return;
    }

    selectionHalo.position.set(centroid[0], -centroid[1], -centroid[2]);
    const gaussianCount = meta.gaussianCount ?? 0;
    const radius = Math.max(0.07, Math.min(0.2, 0.07 + gaussianCount / 350000));
    selectionHalo.scale.setScalar(radius / 0.085);
    selectionHalo.visible = true;
  }

  function renderTerminalAnnotation(clusterId, body) {
    const prompt = `${renderPromptLine()}`;
    const text = `${prompt}\n------- object ${clusterId} -----:\n${escapeHtml(body)}`;
    typeTerminalHtml(text);
  }

  function typeTerminalText(text) {
    typeTerminalHtml(escapeHtml(text));
  }

  function typeTerminalHtml(html) {
    const token = ++typewriterToken;
    terminalOutputEl.innerHTML = '';

    const chars = [...html];
    let index = 0;

    function step() {
      if (token !== typewriterToken) return;
      terminalOutputEl.innerHTML = chars.slice(0, index).join('');
      if (index < chars.length) {
        index += 1;
        window.setTimeout(step, index < 32 ? 10 : 6);
      }
    }

    step();
  }

  function getNextSegmentEntry() {
    const segments = manager.segments.filter(({ meta }) => hasAnnotation(meta));
    if (segments.length === 0) return null;

    if (!currentSelection) {
      return segments[0];
    }

    const currentIndex = segments.findIndex(entry => entry.meta.clusterId === currentSelection.meta.clusterId);
    const nextIndex = currentIndex >= 0 ? (currentIndex + 1) % segments.length : 0;
    return segments[nextIndex];
  }

  function getConfiguredAssetBaseUrl() {
    const configured = window.ASSET_BASE_URL
      ?? new URLSearchParams(window.location.search).get('assets')
      ?? getDefaultAssetBaseUrl();
    return configured.endsWith('/') ? configured : `${configured}/`;
  }

  function getDefaultAssetBaseUrl() {
    const hostname = window.location.hostname;
    if (hostname === 'localhost' || hostname === '127.0.0.1') {
      return './assets/';
    }
    if (hostname === 'anonymous-room.pages.dev') {
      return 'https://assets.loriechen.com/';
    }
    return './assets/';
  }

  function renderPromptPrefix() {
    return '<span class="terminal-prompt">lorie@catalogue_raisonne: ~/' + escapeHtml(scenePathName) + '/$</span>';
  }

  function renderPromptLine() {
    return `${renderPromptPrefix()} <span class="terminal-prefix"></span>`;
  }

  function escapeHtml(text) {
    return String(text)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }
</script>

</body>
</html>
