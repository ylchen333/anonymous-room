<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Splat Walkthrough</title>
  <style>
    :root {
      --bg: #111111;
      --panel: rgba(12, 14, 16, 0.82);
      --panel-border: rgba(255, 255, 255, 0.16);
      --text: #e8e8e8;
      --muted: #9aa0a6;
      --prompt: #7ed3a6;
      --warning: #f0cf73;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
    }

    #loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: rgba(10, 10, 10, 0.9);
      z-index: 400;
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
      color: white;
    }

    #loading-overlay.is-compact {
      inset: auto 22px 22px auto;
      width: min(320px, calc(100vw - 44px));
      padding: 14px 16px;
      align-items: stretch;
      background: rgba(10, 10, 10, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.32);
    }

    #loading-label {
      font-size: 13px;
      color: #c8c8c8;
    }

    #loading-bar-track {
      width: min(340px, calc(100vw - 48px));
      height: 3px;
      background: rgba(255, 255, 255, 0.12);
      overflow: hidden;
    }

    #loading-bar-fill {
      width: 0%;
      height: 100%;
      background: var(--prompt);
      transition: width 0.18s ease;
    }

    #click-to-start {
      display: none;
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 200;
      cursor: pointer;
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    #click-to-start .prompt {
      background: rgba(0, 0, 0, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 16px 18px;
      max-width: min(420px, calc(100vw - 32px));
      line-height: 1.6;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.32);
      pointer-events: auto;
    }

    #terminal-overlay {
      display: none;
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 150;
      width: fit-content;
      max-width: min(420px, calc(100vw - 36px));
      padding: 14px 16px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      pointer-events: auto;
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    #terminal-header {
      margin-bottom: 6px;
    }

    #terminal-help {
      color: var(--text);
      margin-bottom: 0;
    }

    .terminal-prefix {
      color: var(--text);
    }

    .terminal-prompt {
      color: var(--prompt);
    }

    #terminal-command {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    #terminal-input {
      width: 100%;
      min-width: 150px;
      border: 0;
      outline: 0;
      padding: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
    }

    #terminal-input::placeholder {
      color: var(--muted);
    }

    #highlight-status {
      display: none;
      position: fixed;
      right: 22px;
      top: 22px;
      z-index: 180;
      padding: 10px 12px;
      background: rgba(10, 18, 24, 0.78);
      border: 1px solid rgba(125, 216, 255, 0.42);
      color: #aee9ff;
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      pointer-events: none;
    }

    @media (max-width: 640px) {
      #terminal-overlay {
        top: 12px;
        left: 12px;
        width: calc(100vw - 24px);
        padding: 12px 13px;
      }
    }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div id="loading-label">Loading scene…</div>
  <div id="loading-bar-track"><div id="loading-bar-fill"></div></div>
</div>

<div id="click-to-start">
  <div class="prompt">click here to enable exploration
esc to unlock camera
click to inspect note</div>
</div>

<div id="terminal-overlay">
  <div id="terminal-header"></div>
  <div id="terminal-help"></div>
  <div id="terminal-output"></div>
  <form id="terminal-command" autocomplete="off">
    <span class="terminal-prompt">$</span>
    <input id="terminal-input" spellcheck="false" placeholder="comments --view_comments" />
  </form>
</div>

<div id="highlight-status">highlight mode</div>

<script type="importmap">
{
  "imports": {
    "three":             "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.179.0/three.module.js",
    "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { AssetLibrary } from './src/assetLibrary.js';
  import { SceneManager } from './src/sceneManager.js';

  const DEFAULT_SCENE_ID = 'SFCI_Take3_RC';
  const ASSET_VERSION = '20260716-cors-1';
  const params = new URLSearchParams(window.location.search);
  const TARGET_SCENE_ID = params.get('scene') ?? DEFAULT_SCENE_ID;
  const ASSET_BASE_URL = getConfiguredAssetBaseUrl();
  const MANIFEST_URL = appendVersion(`${ASSET_BASE_URL}${TARGET_SCENE_ID}_manifest.json`, ASSET_VERSION);
  const COMMENT_STORAGE_KEY = `catalogue_comments:${TARGET_SCENE_ID}`;
  const PROFILE_STORAGE_KEY = 'catalogue_profile';
  const HIGHLIGHT_KEY = 'KeyH';

  const loadingEl = document.getElementById('loading-overlay');
  const loadingLabel = document.getElementById('loading-label');
  const loadingFill = document.getElementById('loading-bar-fill');
  const clickToStart = document.getElementById('click-to-start');
  const terminalEl = document.getElementById('terminal-overlay');
  const terminalHeaderEl = document.getElementById('terminal-header');
  const terminalHelpEl = document.getElementById('terminal-help');
  const terminalOutputEl = document.getElementById('terminal-output');
  const terminalCommandEl = document.getElementById('terminal-command');
  const terminalInputEl = document.getElementById('terminal-input');
  const highlightStatusEl = document.getElementById('highlight-status');

  const library = new AssetLibrary(MANIFEST_URL, ASSET_BASE_URL, ASSET_VERSION);
  await library.load();
  const scene = library.getById(TARGET_SCENE_ID) ?? library.getAll().find(entry => library.hasSegments(entry));

  if (!scene) {
    throw new Error('No annotated scene was found in the manifest.');
  }

  const manager = new SceneManager(null, { onEvent: handleSceneEvent });
  const scenePromptName = scene.id.split('_')[0] || scene.id || 'scene';
  const scenePathName = scene.room || scenePromptName;
  const selectionHalo = buildSelectionHalo();
  const selectionAnchor = buildSelectionAnchor();
  const brushGroup = new THREE.Group();
  const brushMaterial = new THREE.MeshBasicMaterial({
    color: 0x82d8ff,
    transparent: true,
    opacity: 0.58,
    depthWrite: false,
  });
  manager.scene.add(selectionHalo);
  manager.scene.add(selectionAnchor);
  manager.scene.add(brushGroup);

  let segmentsReady = false;
  let currentSelection = null;
  let highlightMode = false;
  let isBrushDown = false;
  let activeBrushPoints = [];
  let activeBrushSegments = [];
  let activeBrushCentroid = null;
  let profile = loadProfile();
  let comments = loadComments();
  let typewriterToken = 0;
  setTerminalScene(scenePromptName);

  await manager.switchScene(scene, library);

  clickToStart.addEventListener('click', () => {
    manager.requestPointerLock();
  });

  manager.canvas.addEventListener('click', event => {
    if (!segmentsReady || highlightMode) return;

    const rect = manager.canvas.getBoundingClientRect();
    const clientX = document.pointerLockElement === manager.canvas
      ? rect.left + rect.width / 2
      : event.clientX;
    const clientY = document.pointerLockElement === manager.canvas
      ? rect.top + rect.height / 2
      : event.clientY;

    const entry = manager.pickSegmentFromScreenPoint(clientX, clientY);
    if (!entry) {
      clearSelection();
      return;
    }

    selectSegment(entry, { focus: false });
  });

  manager.canvas.addEventListener('pointerdown', event => {
    if (!highlightMode || event.button !== 0) return;
    isBrushDown = true;
    addBrushPoint(event);
  });

  manager.canvas.addEventListener('pointermove', event => {
    if (!highlightMode || !isBrushDown) return;
    addBrushPoint(event);
  });

  document.addEventListener('pointerup', () => {
    if (!highlightMode) return;
    isBrushDown = false;
    updateBrushCentroid();
  });

  terminalCommandEl.addEventListener('submit', async event => {
    event.preventDefault();
    const command = terminalInputEl.value.trim();
    terminalInputEl.value = '';
    if (command) await runTerminalCommand(command);
  });

  terminalInputEl.addEventListener('keydown', event => {
    event.stopPropagation();
  });

  document.addEventListener('keydown', event => {
    if (event.target === terminalInputEl) return;
    if (event.code === HIGHLIGHT_KEY) {
      event.preventDefault();
      event.stopPropagation();
      setHighlightMode(!highlightMode);
      return;
    }

    if (event.code !== 'Space' || !segmentsReady) return;
    event.preventDefault();
    event.stopPropagation();
    manager.setKeyState('Space', false);

    const nextEntry = getNextSegmentEntry();
    if (nextEntry) {
      selectSegment(nextEntry, { focus: true });
    }
  });

  document.addEventListener('keyup', event => {
    if (event.code === 'Space') {
      event.preventDefault();
      event.stopPropagation();
      manager.setKeyState('Space', false);
    }
  });

  function handleSceneEvent(event) {
    switch (event.type) {
      case 'loadProgress': {
        const pct = Math.round((event.n / event.total) * 45);
        loadingFill.style.width = pct + '%';
        loadingLabel.textContent = `loading base splat ${event.n}/${event.total}...`;
        break;
      }

      case 'loadDone': {
        loadingFill.style.width = '48%';
        loadingLabel.textContent = 'revealing splat; loading annotated segments...';
        loadingEl.classList.add('is-compact');
        terminalEl.style.display = 'block';
        clickToStart.style.display = 'block';
        break;
      }

      case 'segmentReady': {
        const total = event.totalExpected;
        const loaded = manager.segments.length;
        const pct = 48 + Math.round((loaded / total) * 52);
        loadingFill.style.width = pct + '%';
        loadingLabel.textContent = `loading annotated segments ${loaded}/${total}...`;
        break;
      }

      case 'allSegmentsReady': {
        segmentsReady = true;
        manager.showAllSegments();
        loadingFill.style.width = '100%';
        loadingEl.style.display = 'none';
        terminalEl.style.display = 'block';
        clickToStart.style.display = 'block';
        break;
      }

      case 'locked': {
        clickToStart.style.display = 'none';
        break;
      }

      case 'unlocked': {
        if (segmentsReady) clickToStart.style.display = 'block';
        break;
      }
    }
  }

  function setTerminalScene(sceneName) {
    terminalHeaderEl.innerHTML = `${renderPromptPrefix()} <span class="terminal-prefix">catalogue_raisonne --help</span>`;
    terminalHelpEl.innerHTML = [
      `${renderPromptLine()} An interactive spatial portrait of a lived workspace at Carnegie Mellon University (the Studio For Creative Inquiry), reconstructed through Gaussian splatting.`,
      // `${renderPromptLine()} A field of objects-tools, fragments, residues-shifts as you move.`,
      `${renderPromptLine()} wasd move | mouse look | scroll zoom | e/q vertical | shift faster | esc release cursor`,
      `${renderPromptLine()} click inspect segment | space next object | h nearest-region highlight | comments --view_comments | comments --write_comment message | comments --clear_highlight | user yourname`
    ].join('\n');
    terminalOutputEl.innerHTML = '';
  }

  function selectSegment(entry, { focus = false } = {}) {
    currentSelection = entry;
    if (focus) {
      manager.focusSegment(entry.meta.clusterId);
    }

    renderSegmentPanel(entry);
    setSelectionHalo(entry.meta);
    manager.highlightSegment(entry.meta.clusterId);
  }

  function clearSelection() {
    currentSelection = null;
    selectionHalo.visible = false;
    selectionAnchor.visible = false;
    manager.clearSegmentHighlight();
    typewriterToken += 1;
    terminalOutputEl.innerHTML = '';
  }

  function hasAnnotation(meta) {
    const text = meta?.text?.trim();
    return Boolean(text && text.toLowerCase() !== 'null');
  }

  function buildSelectionHalo() {
    const geometry = new THREE.SphereGeometry(0.085, 24, 24);
    const material = new THREE.MeshBasicMaterial({
      color: 0x59a7ff,
      transparent: true,
      opacity: 0.24,
      depthWrite: false,
    });
    const halo = new THREE.Mesh(geometry, material);
    halo.visible = false;
    return halo;
  }

  function setSelectionHalo(meta) {
    const centroid = meta?.centroid;
    if (!Array.isArray(centroid) || centroid.length !== 3) {
      selectionHalo.visible = false;
      return;
    }

    selectionHalo.position.set(centroid[0], -centroid[1], -centroid[2]);
    selectionAnchor.position.copy(selectionHalo.position);
    const gaussianCount = meta.gaussianCount ?? 0;
    const radius = Math.max(0.07, Math.min(0.2, 0.07 + gaussianCount / 350000));
    selectionHalo.scale.setScalar(radius / 0.085);
    selectionHalo.visible = true;
    selectionAnchor.visible = true;
  }

  function buildSelectionAnchor() {
    const geometry = new THREE.SphereGeometry(0.035, 18, 18);
    const material = new THREE.MeshBasicMaterial({
      color: 0x82d8ff,
      transparent: true,
      opacity: 0.92,
      depthWrite: false,
    });
    const anchor = new THREE.Mesh(geometry, material);
    anchor.visible = false;
    return anchor;
  }

  async function renderSegmentPanel(entry) {
    const body = hasAnnotation(entry.meta)
      ? entry.meta.text.trim()
      : 'no annotation is attached to this segment yet.';
    const scope = getCurrentScope();
    const scoped = await getCommentsForScope(scope);
    const commentsText = scoped.length
      ? scoped.map(formatCommentLine).join('\n')
      : 'no comments for this scope.';
    const target = getScopeLabel(scope);
    const text = [
      `${renderPromptLine()}`,
      `------- object ${entry.meta.clusterId} -----:`,
      escapeHtml(body),
      '',
      `comments for ${escapeHtml(target)}:`,
      escapeHtml(commentsText),
    ].join('\n');
    typeTerminalHtml(text);
  }

  function renderTerminalAnnotation(clusterId, body) {
    const prompt = `${renderPromptLine()}`;
    const text = `${prompt}\n------- object ${clusterId} -----:\n${escapeHtml(body)}`;
    typeTerminalHtml(text);
  }

  async function runTerminalCommand(command) {
    if (command === 'help' || command === '--help') {
      setTerminalScene(scenePromptName);
      return;
    }

    if (command === 'anonymous') {
      setUsername('');
      typeTerminalText('identity set to anonymous.');
      return;
    }

    if (command.startsWith('user ')) {
      setUsername(command.slice(5).trim());
      typeTerminalText(`identity set to ${profile.username || 'anonymous'}.`);
      return;
    }

    if (command.startsWith('comments ')) {
      await handleCommentCommand(command);
      return;
    }

    typeTerminalText(`unknown command: ${command}\ntry: user yourname | anonymous | comments --view_comments | comments --write_comment message`);
  }

  async function handleCommentCommand(command) {
    if (command.includes('--clear_highlight')) {
      clearHighlightBrush();
      typeTerminalText('cleared active highlight brush. comments now target the selected segment or full splat.');
      return;
    }

    if (command.includes('--view_comments')) {
      await renderScopedComments();
      return;
    }

    const writeIndex = command.indexOf('--write_comment');
    if (writeIndex >= 0) {
      const message = command.slice(writeIndex + '--write_comment'.length).trim();
      if (!message) {
        typeTerminalText('missing comment text. example: comments --write_comment this area feels layered');
        return;
      }
      await writeComment(message);
      return;
    }

    typeTerminalText('comment command requires --view_comments or --write_comment message');
  }

  async function writeComment(message) {
    const scope = getCurrentScope();
    const highlight = scope.type === 'highlight' ? serializeActiveHighlight() : null;
    const draft = {
      scene: scene.id,
      author: profile.username || 'anonymous',
      message,
      scope,
      highlight,
    };
    const comment = await saveCommentToBackend(draft);
    comments.push(comment);
    saveLocalComments();
    typeTerminalText(`saved comment on ${getScopeLabel(scope)} as ${comment.author}.\n\n${formatCommentLine(comment)}`);
  }

  async function renderScopedComments() {
    const scope = getCurrentScope();
    const scoped = await getCommentsForScope(scope);
    const lines = scoped.length ? scoped.map(formatCommentLine).join('\n') : 'no comments for this scope.';
    typeTerminalText(`comments for ${getScopeLabel(scope)}:\n${lines}`);
  }

  function getCurrentScope() {
    if (activeBrushPoints.length > 0) {
      return {
        type: 'highlight',
        id: activeBrushCentroid ? formatPointId(activeBrushCentroid) : `highlight-${activeBrushPoints.length}`,
      };
    }

    if (currentSelection?.meta) {
      return { type: 'segment', id: String(currentSelection.meta.clusterId) };
    }

    return { type: 'scene', id: scene.id };
  }

  async function getCommentsForScope(scope) {
    await refreshCommentsFromBackend(scope);
    return comments.filter(comment => comment.scope?.type === scope.type && comment.scope?.id === scope.id);
  }

  function getScopeLabel(scope) {
    if (scope.type === 'segment') return `segment ${scope.id}`;
    if (scope.type === 'highlight') return `highlight ${scope.id}`;
    return 'full splat';
  }

  function formatCommentLine(comment) {
    const date = new Date(comment.createdAt);
    const stamp = Number.isNaN(date.getTime()) ? 'unknown time' : date.toLocaleString();
    return `[${stamp}] ${comment.author}: ${comment.message}`;
  }

  function setUsername(username) {
    profile = { username: username.trim() };
    localStorage.setItem(PROFILE_STORAGE_KEY, JSON.stringify(profile));
  }

  function loadProfile() {
    try {
      return JSON.parse(localStorage.getItem(PROFILE_STORAGE_KEY)) ?? { username: '' };
    } catch {
      return { username: '' };
    }
  }

  function loadComments() {
    try {
      const parsed = JSON.parse(localStorage.getItem(COMMENT_STORAGE_KEY));
      return Array.isArray(parsed) ? parsed : [];
    } catch {
      return [];
    }
  }

  function saveLocalComments() {
    localStorage.setItem(COMMENT_STORAGE_KEY, JSON.stringify(comments));
  }

  async function refreshCommentsFromBackend(scope) {
    try {
      const response = await fetch(buildCommentsUrl(scope), {
        headers: { Accept: 'application/json' },
      });
      if (!response.ok) throw new Error(`comments api returned ${response.status}`);
      const data = await response.json();
      if (Array.isArray(data.comments)) {
        mergeComments(data.comments);
        saveLocalComments();
      }
    } catch (error) {
      console.warn('Using cached local comments; backend read failed.', error);
    }
  }

  async function saveCommentToBackend(draft) {
    try {
      const response = await fetch('/api/comments', {
        method: 'POST',
        headers: {
          Accept: 'application/json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(draft),
      });
      if (!response.ok) throw new Error(`comments api returned ${response.status}`);
      const data = await response.json();
      if (data.comment) return data.comment;
    } catch (error) {
      console.warn('Saving comment locally; backend write failed.', error);
    }

    return {
      id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
      scene: draft.scene,
      author: draft.author,
      message: draft.message,
      scope: draft.scope,
      highlight: draft.highlight,
      createdAt: new Date().toISOString(),
    };
  }

  function buildCommentsUrl(scope) {
    const url = new URL('/api/comments', window.location.origin);
    url.searchParams.set('scene', scene.id);
    url.searchParams.set('scope_type', scope.type);
    url.searchParams.set('scope_id', scope.id);
    return url;
  }

  function mergeComments(incoming) {
    const byId = new Map(comments.map(comment => [comment.id, comment]));
    for (const comment of incoming) {
      if (comment?.id) byId.set(comment.id, comment);
    }
    comments = [...byId.values()].sort((a, b) => {
      return new Date(a.createdAt).getTime() - new Date(b.createdAt).getTime();
    });
  }

  function typeTerminalText(text) {
    typeTerminalHtml(escapeHtml(text));
  }

  function typeTerminalHtml(html) {
    const token = ++typewriterToken;
    terminalOutputEl.innerHTML = '';

    const chars = [...html];
    let index = 0;

    function step() {
      if (token !== typewriterToken) return;
      terminalOutputEl.innerHTML = chars.slice(0, index).join('');
      if (index < chars.length) {
        index += 1;
        window.setTimeout(step, index < 32 ? 10 : 6);
      }
    }

    step();
  }

  function getNextSegmentEntry() {
    const segments = manager.segments.filter(({ meta }) => hasAnnotation(meta));
    if (segments.length === 0) return null;

    if (!currentSelection) {
      return segments[0];
    }

    const currentIndex = segments.findIndex(entry => entry.meta.clusterId === currentSelection.meta.clusterId);
    const nextIndex = currentIndex >= 0 ? (currentIndex + 1) % segments.length : 0;
    return segments[nextIndex];
  }

  function setHighlightMode(enabled) {
    highlightMode = enabled;
    manager.setNavigationPaused(enabled);
    highlightStatusEl.style.display = enabled ? 'block' : 'none';
    manager.canvas.style.cursor = enabled ? 'crosshair' : '';
    if (enabled && document.pointerLockElement === manager.canvas) {
      document.exitPointerLock();
    }
    typeTerminalText(enabled
      ? 'highlight mode enabled. drag to sample the loaded region nearest your camera, then use comments --write_comment message.'
      : 'highlight mode disabled.');
  }

  function clearHighlightBrush() {
    activeBrushPoints = [];
    activeBrushSegments = [];
    activeBrushCentroid = null;
    brushGroup.clear();
  }

  function addBrushPoint(event) {
    const sample = getBrushSample();
    if (!sample) return;

    const last = activeBrushPoints.at(-1);
    if (last && last.distanceTo(sample.point) < 0.05) return;

    activeBrushPoints.push(sample.point);
    if (!activeBrushSegments.includes(sample.clusterId)) {
      activeBrushSegments.push(sample.clusterId);
    }
    const marker = new THREE.Mesh(new THREE.SphereGeometry(0.045, 12, 12), brushMaterial);
    marker.position.copy(sample.point);
    marker.name = 'comment-highlight-point';
    brushGroup.add(marker);
    manager.highlightSegment(sample.clusterId);
    updateBrushCentroid();
  }

  function getBrushSample() {
    const entry = manager.findClosestSegmentToCamera();
    const centroid = entry?.meta?.centroid;
    if (!entry || !Array.isArray(centroid) || centroid.length !== 3) return null;

    return {
      clusterId: entry.meta.clusterId,
      point: new THREE.Vector3(centroid[0], -centroid[1], -centroid[2]),
    };
  }

  function updateBrushCentroid() {
    if (activeBrushPoints.length === 0) {
      activeBrushCentroid = null;
      return;
    }
    activeBrushCentroid = activeBrushPoints
      .reduce((sum, point) => sum.add(point), new THREE.Vector3())
      .multiplyScalar(1 / activeBrushPoints.length);
  }

  function serializeActiveHighlight() {
    return {
      centroid: activeBrushCentroid ? activeBrushCentroid.toArray() : null,
      points: activeBrushPoints.map(point => point.toArray()),
      segments: [...activeBrushSegments],
    };
  }

  function formatPointId(point) {
    return point.toArray().map(value => value.toFixed(2)).join(',');
  }

  function getConfiguredAssetBaseUrl() {
    const configured = window.ASSET_BASE_URL
      ?? new URLSearchParams(window.location.search).get('assets')
      ?? 'https://assets.loriechen.com/';
    return configured.endsWith('/') ? configured : `${configured}/`;
  }

  function appendVersion(url, version) {
    if (!version) return url;
    return url + (url.includes('?') ? '&' : '?') + 'v=' + encodeURIComponent(version);
  }

  function renderPromptPrefix() {
    return '<span class="terminal-prompt">lorie@catalogue_raisonne: ~/' + escapeHtml(scenePathName) + '/$</span>';
  }

  function renderPromptLine() {
    return `${renderPromptPrefix()} <span class="terminal-prefix"></span>`;
  }

  function escapeHtml(text) {
    return String(text)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }
</script>

</body>
</html>
